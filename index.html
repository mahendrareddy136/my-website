<!DOCTYPE html>
<html>
<head>
<title>ATHADU</title>
<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f0f0f0;
}
.box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
}
input{
    width:100%;
    padding:8px;
    margin:5px 0;
}
button{
    width:100%;
    padding:10px;
}
</style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="user"
    placeholder="Username">
    <input type="password" id="pass"
    placeholder="Password">
    <button onclick="login()">Login</button>
</div>
<script>
function login(){

let username = document.getElementById("user").value;
let password = document.getElementById("pass").value;

if(username=="athadu" && password=="1234"){
    window.location.href="home.html";
}
else{
    alert("Wrong Username or Password");
}

}
</script>
</body>
</html>
